<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track-X Intelligence - WA Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // Mocking Lucide icons for React
        const Icon = ({ name, className, size = 24 }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [phoneNumber, setPhoneNumber] = useState('');
            const [history, setHistory] = useState([]);
            const [lookupResult, setLookupResult] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');
            const [loadingStep, setLoadingStep] = useState('');

            // GANTI DENGAN API KEY ANDA DI SINI UNTUK PENGGUNAAN PRIBADI
            const apiKey = ""; 

            const validateNumber = (number) => {
                const cleanNumber = number.replace(/\D/g, '');
                return cleanNumber.length >= 10 ? cleanNumber : false;
            };

            const callGemini = async (cleanNumber) => {
                const systemPrompt = `Anda adalah ahli database HLR telekomunikasi. Berikan hasil area pendaftaran nomor dalam format JSON murni: { "country": "", "flag": "", "provider": "", "province": "", "city": "", "district": "", "village": "", "lat": 0, "lng": 0, "status": "Aktif", "accuracy": "95%" }. Khusus Indonesia, sesuaikan prefixnya.`;
                const userQuery = `Lacak pendaftaran nomor: ${cleanNumber}`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (err) {
                    throw new Error('API Error');
                }
            };

            const handleLookup = async () => {
                setError('');
                const cleanNumber = validateNumber(phoneNumber);
                if (!cleanNumber) return setError('Nomor tidak valid.');
                if (!apiKey) return setError('API Key belum diisi di kode.');

                setIsLoading(true);
                setLookupResult(null);
                try {
                    setLoadingStep('Menghubungkan ke satelit...');
                    const resultData = await callGemini(cleanNumber);
                    setLoadingStep('Sinkronisasi koordinat...');
                    const result = { id: Date.now(), clean: cleanNumber, timestamp: new Date().toLocaleString(), ...resultData };
                    setLookupResult(result);
                    setHistory(prev => [result, ...prev.slice(0, 4)]);
                } catch (err) {
                    setError('Gagal melacak. Periksa API Key Anda.');
                } finally {
                    setIsLoading(false);
                    setLoadingStep('');
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="flex items-center justify-between mb-8">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-600 p-3 rounded-2xl shadow-lg shadow-emerald-200">
                                    <Icon name="radar" className="text-white" size={32} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black text-slate-800 uppercase">Track-X</h1>
                                    <p className="text-emerald-600 text-[10px] font-bold uppercase tracking-widest">HLR Tracking System</p>
                                </div>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2 space-y-6">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <div className="relative flex-1">
                                            <input
                                                type="text"
                                                placeholder="6281234..."
                                                className="w-full pl-6 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-emerald-500 font-medium text-lg"
                                                value={phoneNumber}
                                                onChange={(e) => setPhoneNumber(e.target.value)}
                                            />
                                        </div>
                                        <button onClick={handleLookup} className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold uppercase">
                                            {isLoading ? "Loading..." : "Lacak"}
                                        </button>
                                    </div>
                                    {error && <p className="mt-3 text-red-500 text-sm font-medium">{error}</p>}
                                </div>

                                {lookupResult && (
                                    <div className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Target</p>
                                                <p className="text-2xl font-black text-slate-800">+{lookupResult.clean}</p>
                                                <p className="text-sm font-bold text-emerald-600 uppercase mt-2">{lookupResult.provider}</p>
                                            </div>
                                            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase">Lokasi</p>
                                                <p className="font-bold text-slate-700">{lookupResult.village}, {lookupResult.city}</p>
                                                <p className="text-xs text-slate-500">{lookupResult.province}</p>
                                            </div>
                                        </div>
                                        <div className="bg-white p-2 rounded-[2.5rem] shadow-xl border border-white overflow-hidden h-[400px]">
                                            <iframe 
                                                width="100%" height="100%" frameBorder="0" 
                                                src={`https://www.openstreetmap.org/export/embed.html?bbox=${lookupResult.lng-0.005}%2C${lookupResult.lat-0.005}%2C${lookupResult.lng+0.005}%2C${lookupResult.lat+0.005}&layer=mapnik&marker=${lookupResult.lat}%2C${lookupResult.lng}`}
                                                className="rounded-[2rem]"
                                            ></iframe>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                                    <h3 className="font-black text-slate-800 uppercase text-xs mb-4">Recent Logs</h3>
                                    <div className="space-y-3">
                                        {history.map(item => (
                                            <div key={item.id} className="p-4 rounded-2xl bg-slate-50 border border-transparent hover:border-emerald-200">
                                                <p className="font-bold text-sm">+{item.clean}</p>
                                                <p className="text-[10px] text-slate-400">{item.village}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
